<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dashboard - QuickBite Delivery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background: #f8fafc;
        }

        .dashboard-header {
            background: #1a1e23;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rider-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .rider-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card p {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
        }

        .status-toggle {
            margin: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #22c55e;
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        .section-title {
            margin: 25px 20px 15px;
            font-weight: 700;
            color: #334155;
            font-size: 1.1rem;
        }

        .orders-list {
            padding: 0 20px 40px;
        }

        .order-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-left: 5px solid var(--primary);
        }

        .order-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .rest-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #1e293b;
        }

        .order-dist {
            font-size: 0.85rem;
            color: #64748b;
        }

        .address-box {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .address-box i {
            color: #94a3b8;
            margin-right: 8px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-status {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-picked {
            background: #3b82f6;
            color: white;
        }

        .btn-delivered {
            background: #22c55e;
            color: white;
        }

        .logout-btn {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <header class="dashboard-header">
        <div class="rider-profile">
            <div class="rider-avatar" id="avatarLetter">R</div>
            <div>
                <h2 style="font-size: 1rem; margin:0" id="riderName">Rider Name</h2>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
        <div style="text-align: right;">
            <p style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 2px;">SESSION EARNINGS</p>
            <p style="font-weight: 700; color: #22c55e; font-size: 1.2rem;">₹<span id="sessionEarnings">0</span></p>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Deliveries</h3>
            <p id="totalDeliveries">0</p>
        </div>
        <div class="stat-card">
            <h3>Rating</h3>
            <p><span id="avgRating">0.0</span> ★</p>
        </div>
        <div class="stat-card">
            <h3>Total Earnings</h3>
            <p>₹<span id="totalEarnings">0</span></p>
        </div>
    </div>

    <div class="status-toggle">
        <div>
            <h3 style="font-size: 1rem; margin-bottom: 2px;">Shift Status</h3>
            <p id="statusText" style="font-size: 0.85rem; color: #64748b;">You are currently Offline</p>
        </div>
        <label class="toggle-switch">
            <input type="checkbox" id="onlineToggle">
            <span class="slider"></span>
        </label>
    </div>

    <h2 class="section-title">Active Orders</h2>
    <div class="orders-list" id="ordersList">
        <div class="empty-state">
            <i class="fas fa-motorcycle"></i>
            <p>No active orders</p>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
        const token = localStorage.getItem('deliveryToken');
        if (!token) window.location.href = '/delivery/login.html';

        let socket;
        let locationInterval;

        async function init() {
            const res = await fetch('/api/delivery/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('riderName').textContent = data.partner.name;
                document.getElementById('avatarLetter').textContent = data.partner.name.charAt(0);
                document.getElementById('sessionEarnings').textContent = data.partner.sessionEarnings || 0;
                document.getElementById('totalEarnings').textContent = data.partner.earnings || 0;
                document.getElementById('totalDeliveries').textContent = data.partner.total_deliveries || 0;
                document.getElementById('avgRating').textContent = (data.partner.averageRating || 0).toFixed(1);

                const toggle = document.getElementById('onlineToggle');
                toggle.checked = data.partner.is_online;
                updateStatusText(data.partner.is_online);

                if (data.partner.is_online) startTracking();
                loadOrders();
            } else {
                localStorage.removeItem('deliveryToken');
                window.location.href = '/delivery/login.html';
            }
        }

        function updateStatusText(isOnline) {
            const text = document.getElementById('statusText');
            text.textContent = isOnline ? 'You are Online & Ready' : 'You are currently Offline';
            text.style.color = isOnline ? '#22c55e' : '#64748b';
        }

        async function loadOrders() {
            const res = await fetch('/api/delivery/orders', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const list = document.getElementById('ordersList');

            if (data.success && data.orders.length > 0) {
                list.innerHTML = data.orders.map(o => `
                    <div class="order-item">
                        <div class="order-row">
                            <span class="rest-name">${o.restaurantId.restaurantName}</span>
                            <span class="order-dist">#${o._id.slice(-6)}</span>
                        </div>
                        <div class="address-box">
                            <i class="fas fa-store"></i> <strong>Pickup:</strong> ${o.restaurantId.branchName}
                        </div>
                        <div class="address-box" style="background: #fff7ed; border: 1px solid #ffedd5;">
                            <i class="fas fa-map-marker-alt"></i> <strong>Deliver to:</strong> ${o.delivery_address}
                        </div>
                        <div class="action-btns">
                            ${o.orderStatus === 'Preparing' ?
                        `<button class="btn-status btn-picked" onclick="updateStatus('${o._id}', 'Picked Up')">Mark Picked Up</button>` :
                        `<div style="width: 100%;">
                                <input type="text" id="code-${o._id}" placeholder="Enter 4-digit code" maxlength="4" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1; text-align: center; font-weight: 700; letter-spacing: 2px;">
                                <button class="btn-status btn-delivered" onclick="updateStatus('${o._id}', 'Delivered')">Verify & Deliver</button>
                            </div>`
                    }
                        </div>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-motorcycle"></i><p>No active orders assigned to you</p></div>';
            }
        }

        async function updateStatus(orderId, status) {
            let verificationCode = null;
            if (status === 'Delivered') {
                verificationCode = document.getElementById(`code-${orderId}`).value;
                if (!verificationCode || verificationCode.length !== 4) {
                    alert('Please enter a valid 4-digit verification code.');
                    return;
                }
            }

            if (!confirm(`Confirm ${status}?`)) return;
            const res = await fetch(`/api/delivery/orders/${orderId}/status`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ status, verificationCode })
            });
            const data = await res.json();
            if (data.success) {
                loadOrders();
                init(); // Refresh earnings/deliveries
            } else {
                alert(data.message || 'Verification failed. Please try again.');
            }
        }

        document.getElementById('onlineToggle').addEventListener('change', async (e) => {
            const is_online = e.target.checked;
            const res = await fetch('/api/delivery/toggle-status', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ is_online })
            });
            const data = await res.json();
            if (data.success) {
                updateStatusText(is_online);
                if (is_online) startTracking();
                else stopTracking();
            }
        });

        function startTracking() {
            if (socket) return;
            socket = io();

            // Mock location data (Delhi areas for example)
            let baseLat = 28.6139;
            let baseLng = 77.2090;

            locationInterval = setInterval(() => {
                // Simulate small movement
                baseLat += (Math.random() - 0.5) * 0.001;
                baseLng += (Math.random() - 0.5) * 0.001;

                // Send for each active order
                const activeOrders = document.querySelectorAll('.order-item');
                activeOrders.forEach(item => {
                    const orderId = item.innerHTML.match(/#([a-f0-9]+)/)?.[1]; // Rough extract for mock
                    // In real app, we iterate data.orders
                });

                // Actually, let's just emit location_update and backend handles specific order rooms
                // But the backend expects { orderId, lat, lng } in delivery_location_update
                // Let's refetch orders to get real IDs for tracking
                fetch('/api/delivery/orders', { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(r => r.json())
                    .then(d => {
                        if (d.success) {
                            d.orders.forEach(o => {
                                socket.emit('delivery_location_update', {
                                    orderId: o._id,
                                    lat: baseLat,
                                    lng: baseLng
                                });
                            });
                        }
                    });

            }, 5000);
        }

        function stopTracking() {
            if (socket) socket.disconnect();
            socket = null;
            clearInterval(locationInterval);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('deliveryToken');
            window.location.href = '/delivery/login.html';
        });

        init();
        setInterval(loadOrders, 10000); // Check for new assignments
    </script>
</body>

</html>
