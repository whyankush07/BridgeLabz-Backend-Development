<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Partner Signup - QuickBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-light); }
        .auth-card { background: #fff; padding: 40px; border-radius: 16px; box-shadow: var(--shadow); width: 100%; max-width: 450px; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-logo { font-size: 2rem; color: var(--primary); font-weight: 800; margin-bottom: 10px; }
        .auth-title { font-size: 1.5rem; color: var(--text-dark); }
        .auth-subtitle { color: var(--text-muted); font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-dark); font-size: 0.9rem; }
        .form-input, .form-select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 1rem; transition: all 0.3s; }
        .form-input:focus, .form-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1); }
        .btn-block { width: 100%; }
        .error-msg { color: #dc3545; font-size: 0.85rem; margin-top: 5px; display: none; }
        .auth-footer { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo"><i class="fas fa-motorcycle"></i> QuickBite Delivery</div>
                <h1 class="auth-title">Become a Partner</h1>
                <p class="auth-subtitle">Join our fleet and start earning today</p>
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="phone" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Vehicle Type</label>
                    <select id="vehicle_type" class="form-select" required>
                        <option value="Bike">Motorcycle</option>
                        <option value="Scooter">Scooter</option>
                        <option value="Bicycle">Bicycle</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" required minlength="6">
                </div>
                <div class="error-msg" id="generalError"></div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Sign Up</button>
            </form>
            <div class="auth-footer">
                Already a partner? <a href="/delivery/login.html">Sign In</a>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('generalError');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;
            err.style.display = 'none';

            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                vehicle_type: document.getElementById('vehicle_type').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/delivery/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('deliveryToken', data.token);
                    window.location.href = '/delivery/dashboard.html';
                } else {
                    err.textContent = data.message || 'Signup failed';
                    err.style.display = 'block';
                }
            } catch (error) {
                err.textContent = 'Network error occurred';
                err.style.display = 'block';
            } finally {
                btn.innerHTML = 'Sign Up';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
