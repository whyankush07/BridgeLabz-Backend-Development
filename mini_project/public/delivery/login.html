<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Partner Login - QuickBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-light); }
        .auth-card { background: #fff; padding: 40px; border-radius: 16px; box-shadow: var(--shadow); width: 100%; max-width: 450px; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-logo { font-size: 2rem; color: var(--primary); font-weight: 800; margin-bottom: 10px; }
        .auth-title { font-size: 1.5rem; color: var(--text-dark); }
        .auth-subtitle { color: var(--text-muted); font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-dark); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 1rem; transition: all 0.3s; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1); }
        .btn-block { width: 100%; }
        .error-msg { color: #dc3545; font-size: 0.85rem; margin-top: 5px; display: none; margin-bottom: 15px; }
        .auth-footer { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo"><i class="fas fa-motorcycle"></i> QuickBite Delivery</div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to start receiving orders</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <div class="error-msg" id="generalError"></div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Sign In</button>
            </form>
            <div class="auth-footer">
                Not a partner yet? <a href="/delivery/signup.html">Apply Now</a>
            </div>
        </div>
    </div>
    
    <script>
        // Restoring session if token is intact
        if(localStorage.getItem('deliveryToken')) {
            window.location.href = '/delivery/dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('generalError');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;
            err.style.display = 'none';

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/delivery/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('deliveryToken', data.token);
                    window.location.href = '/delivery/dashboard.html';
                } else {
                    err.textContent = data.message || 'Login failed';
                    err.style.display = 'block';
                }
            } catch (error) {
                err.textContent = 'Network error occurred';
                err.style.display = 'block';
            } finally {
                btn.innerHTML = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
