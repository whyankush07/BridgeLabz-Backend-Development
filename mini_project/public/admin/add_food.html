<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Food – QuickBite Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-brand"><a href="/admin/dashboard.html"><i class="fas fa-fire-alt"></i> QuickBite Admin</a>
            </div>
            <nav class="admin-nav">
                <a class="admin-nav-item" href="/admin/dashboard.html"><i class="fas fa-tachometer-alt"></i>
                    Dashboard</a>
                <a class="admin-nav-item" href="/admin/manage_orders.html"><i class="fas fa-clipboard-list"></i> Manage
                    Orders</a>
                <a class="admin-nav-item active" href="/admin/add_food.html"><i class="fas fa-plus-circle"></i> Add
                    Food</a>
                <a class="admin-nav-item" href="/admin/food_list.html"><i class="fas fa-list"></i> Food List</a>
                <a class="admin-nav-item" href="/"><i class="fas fa-home"></i> View Site</a>
                <a class="admin-nav-item" href="#" id="adminLogout" style="color:#ff6b6b"><i
                        class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <main class="admin-main">
            <div class="admin-topbar">
                <h2><i class="fas fa-plus-circle" style="color:var(--primary)"></i> Add New Food Item</h2>
            </div>
            <div class="admin-content">
                <div class="admin-form-card">
                    <div id="alertBox" style="display:none;margin-bottom:20px"></div>
                    <form id="addFoodForm" enctype="multipart/form-data">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Food Name *</label>
                                <input type="text" name="food_name" class="form-control"
                                    placeholder="e.g. Margherita Pizza" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Category *</label>
                                <select name="category" class="form-control" required>
                                    <option value="">Select Category</option>
                                    <option>Pizza</option>
                                    <option>Burger</option>
                                    <option>Biryani</option>
                                    <option>Drinks</option>
                                    <option>Desserts</option>
                                    <option>Snacks</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3"
                                placeholder="Brief description of the dish (optional)"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Price (₹) *</label>
                                <input type="number" name="price" class="form-control" placeholder="e.g. 249"
                                    step="0.01" min="1" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Food Image</label>
                                <input type="file" name="image" class="form-control"
                                    accept="image/jpeg,image/png,image/webp">
                                <small style="color:var(--text-muted);font-size:0.75rem">Max 3MB. JPEG, PNG or
                                    WebP.</small>
                            </div>
                        </div>
                        <div class="form-group">
                            <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
                                <input type="checkbox" name="is_featured" value="1"
                                    style="width:18px;height:18px;accent-color:var(--primary)">
                                <span class="form-label" style="margin:0">Feature on Homepage</span>
                            </label>
                        </div>
                        <div style="display:flex;gap:16px;margin-top:8px">
                            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                                <i class="fas fa-plus"></i> Add Food Item
                            </button>
                            <a href="/admin/food_list.html" class="btn btn-outline btn-lg">
                                <i class="fas fa-list"></i> View All Foods
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        async function checkAdmin() {
            const meRes = await fetch('/api/me', { headers: getAuthHeaders() });
            const me = await meRes.json();
            if (!me.loggedIn || me.role !== 'admin') { window.location.href = '/admin/admin_login.html'; }
        }

        document.getElementById('addFoodForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding…';

            const formData = new FormData(this);
            try {
                const res = await fetch('/api/admin/foods', { method: 'POST', body: formData, headers: getAuthHeaders() });
                const data = await res.json();
                const box = document.getElementById('alertBox');
                box.style.display = 'flex';
                if (data.success) {
                    box.className = 'alert alert-success';
                    box.innerHTML = `<i class="fas fa-check-circle"></i><div>${data.message}</div>`;
                    this.reset();
                    showToast('Food item added!', 'success');
                } else {
                    box.className = 'alert alert-danger';
                    box.innerHTML = `<i class="fas fa-exclamation-circle"></i><div>${data.message}</div>`;
                }
            } catch { showToast('Network error.', 'error'); }
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-plus"></i> Add Food Item';
        });

        document.getElementById('adminLogout').addEventListener('click', async (e) => {
            e.preventDefault(); await fetch('/api/logout', { method: 'POST' }); window.location.href = '/admin/admin_login.html';
        });
        document.addEventListener('DOMContentLoaded', checkAdmin);
    </script>
</body>

</html>
