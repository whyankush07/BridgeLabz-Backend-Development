<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – QuickBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-brand"><a href="/admin/dashboard.html"><i class="fas fa-fire-alt"></i> QuickBite Admin</a>
            </div>
            <nav class="admin-nav">
                <a class="admin-nav-item active" href="/admin/dashboard.html"><i class="fas fa-tachometer-alt"></i>
                    Dashboard</a>
                <a class="admin-nav-item" href="/admin/manage_orders.html"><i class="fas fa-clipboard-list"></i> Manage
                    Orders</a>
                <a class="admin-nav-item" href="/admin/add_food.html"><i class="fas fa-plus-circle"></i> Add Food</a>
                <a class="admin-nav-item" href="/" style="margin-top:auto"><i class="fas fa-home"></i> View Site</a>
                <a class="admin-nav-item" href="#" id="adminLogout" style="color:#ff6b6b"><i
                        class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <h2><i class="fas fa-tachometer-alt" style="color:var(--primary)"></i> Dashboard</h2>
                <span id="adminWelcome" style="color:var(--text-muted);font-size:0.875rem"></span>
            </div>
            <div class="admin-content">
                <div class="stat-cards" id="statCards">
                    <div style="grid-column:1/-1;text-align:center;padding:40px">
                        <div class="spinner" style="margin:0 auto"></div>
                    </div>
                </div>
                <div class="admin-table-card" id="recentOrdersCard" style="display:none">
                    <h3><i class="fas fa-clock" style="color:var(--primary)"></i> Recent Orders</h3>
                    <div style="overflow-x:auto">
                        <table class="admin-table" id="recentOrdersTable">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="recentOrdersBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        const statusClasses = { 'Placed': 'badge-pending', 'Preparing': 'badge-preparing', 'Out for Delivery': 'badge-delivery', 'Delivered': 'badge-delivered', 'Cancelled': 'badge-cancelled' };

        async function loadDashboard() {
            const meRes = await fetch('/api/me', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const me = await meRes.json();
            if (!me.loggedIn || me.role !== 'admin') { 
                window.location.href = '/admin/admin_login.html'; 
                return; 
            }
            document.getElementById('adminWelcome').textContent = `Welcome, ${me.user_name}`;

            const res = await fetch('/api/admin/stats', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const data = await res.json();
             if (!data.success) return;

            const { stats, recentOrders } = data;
            document.getElementById('statCards').innerHTML = `
        <div class="stat-card"><div class="stat-card-icon orange"><i class="fas fa-utensils"></i></div><div class="stat-card-info"><div class="label">Total Foods</div><div class="value">${stats.foods}</div></div></div>
        <div class="stat-card"><div class="stat-card-icon blue"><i class="fas fa-users"></i></div><div class="stat-card-info"><div class="label">Total Users</div><div class="value">${stats.users}</div></div></div>
        <div class="stat-card"><div class="stat-card-icon purple"><i class="fas fa-clipboard-list"></i></div><div class="stat-card-info"><div class="label">Total Orders</div><div class="value">${stats.orders}</div></div></div>
        <div class="stat-card"><div class="stat-card-icon green"><i class="fas fa-rupee-sign"></i></div><div class="stat-card-info"><div class="label">Revenue (Delivered)</div><div class="value">₹${parseFloat(stats.revenue || 0).toFixed(0)}</div></div></div>
    `;

            if (recentOrders?.length) {
                document.getElementById('recentOrdersCard').style.display = 'block';
                document.getElementById('recentOrdersBody').innerHTML = recentOrders.map(o => {
                    const custName = o.userId ? o.userId.name : (o.delivery_name || '--');
                    return `
            <tr>
                <td><strong style="color:var(--primary)">#${String(o._id).padStart(6, '0').slice(-6)}</strong></td>
                <td>${custName}</td>
                <td>₹${parseFloat(o.totalPrice).toFixed(2)}</td>
                <td><span class="badge ${statusClasses[o.orderStatus] || 'badge-pending'}">${o.orderStatus}</span></td>
                <td>${new Date(o.createdAt).toLocaleDateString('en-IN')}</td>
            </tr>`;
                }).join('');
            }
        }

        document.getElementById('adminLogout').addEventListener('click', async (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/admin/admin_login.html';
        });

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>

</html>
