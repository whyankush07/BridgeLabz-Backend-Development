<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Food – QuickBite Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-brand"><a href="/admin/dashboard.html"><i class="fas fa-fire-alt"></i> QuickBite Admin</a>
            </div>
            <nav class="admin-nav">
                <a class="admin-nav-item" href="/admin/dashboard.html"><i class="fas fa-tachometer-alt"></i>
                    Dashboard</a>
                <a class="admin-nav-item" href="/admin/manage_orders.html"><i class="fas fa-clipboard-list"></i> Manage
                    Orders</a>
                <a class="admin-nav-item" href="/admin/add_food.html"><i class="fas fa-plus-circle"></i> Add Food</a>
                <a class="admin-nav-item active" href="/admin/food_list.html"><i class="fas fa-list"></i> Food List</a>
                <a class="admin-nav-item" href="/"><i class="fas fa-home"></i> View Site</a>
                <a class="admin-nav-item" href="#" id="adminLogout" style="color:#ff6b6b"><i
                        class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <main class="admin-main">
            <div class="admin-topbar">
                <h2><i class="fas fa-edit" style="color:var(--primary)"></i> Edit Food Item</h2>
            </div>
            <div class="admin-content">
                <div class="admin-form-card" id="editFormContainer">
                    <div style="text-align:center;padding:40px">
                        <div class="spinner" style="margin:0 auto"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        const foodId = new URLSearchParams(window.location.search).get('id');

        async function loadFood() {
            const meRes = await fetch('/api/me', { headers: getAuthHeaders() });
            const me = await meRes.json();
            if (!me.loggedIn || me.role !== 'admin') { window.location.href = '/admin/admin_login.html'; return; }
            if (!foodId) { window.location.href = '/admin/food_list.html'; return; }

            const res = await fetch(`/api/admin/foods/${foodId}`);
            const data = await res.json();
            if (!data.success) { window.location.href = '/admin/food_list.html'; return; }
            const f = data.food;
            const cats = ['Pizza', 'Burger', 'Biryani', 'Drinks', 'Desserts', 'Snacks'];
            const catOpts = cats.map(c => `<option ${f.category === c ? 'selected' : ''}>${c}</option>`).join('');

            document.getElementById('editFormContainer').innerHTML = `
        <div id="alertBox" style="display:none;margin-bottom:20px"></div>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:28px">
            <img src="/images/${f.image}" alt="${f.food_name}" style="width:80px;height:80px;border-radius:12px;object-fit:cover"
                 onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100&q=75'">
            <div><h3 style="margin:0">${f.food_name}</h3><p style="margin:4px 0 0;color:var(--text-muted)">${f.category}</p></div>
        </div>
        <form id="editFoodForm" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Food Name *</label>
                    <input type="text" name="food_name" class="form-control" value="${f.food_name}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select name="category" class="form-control" required><option value="">Select</option>${catOpts}</select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">${f.description || ''}</textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Price (₹) *</label>
                    <input type="number" name="price" class="form-control" value="${parseFloat(f.price).toFixed(2)}" step="0.01" min="1" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Replace Image</label>
                    <input type="file" name="image" class="form-control" accept="image/jpeg,image/png,image/webp">
                    <small style="color:var(--text-muted);font-size:0.75rem">Leave blank to keep current image.</small>
                </div>
            </div>
            <div class="form-group">
                <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
                    <input type="checkbox" name="is_featured" value="1" ${f.is_featured ? 'checked' : ''} style="width:18px;height:18px;accent-color:var(--primary)">
                    <span class="form-label" style="margin:0">Feature on Homepage</span>
                </label>
            </div>
            <div style="display:flex;gap:16px;margin-top:8px">
                <button type="submit" class="btn btn-primary btn-lg" id="submitBtn"><i class="fas fa-save"></i> Save Changes</button>
                <a href="/admin/food_list.html" class="btn btn-outline btn-lg"><i class="fas fa-arrow-left"></i> Cancel</a>
            </div>
        </form>`;

            document.getElementById('editFoodForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';
                const formData = new FormData(this);
                try {
                const res = await fetch(`/api/admin/foods/${foodId}`, { method: 'PUT', body: formData, headers: getAuthHeaders() });
                    const data = await res.json();
                    const box = document.getElementById('alertBox');
                    box.style.display = 'flex';
                    if (data.success) {
                        box.className = 'alert alert-success';
                        box.innerHTML = `<i class="fas fa-check-circle"></i><div>${data.message}</div>`;
                        showToast('Updated!', 'success');
                    } else {
                        box.className = 'alert alert-danger';
                        box.innerHTML = `<i class="fas fa-exclamation-circle"></i><div>${data.message}</div>`;
                    }
                } catch { showToast('Network error.', 'error'); }
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
            });
        }

        document.getElementById('adminLogout').addEventListener('click', async (e) => {
            e.preventDefault(); await fetch('/api/logout', { method: 'POST' }); window.location.href = '/admin/admin_login.html';
        });
        document.addEventListener('DOMContentLoaded', loadFood);
    </script>
</body>

</html>
