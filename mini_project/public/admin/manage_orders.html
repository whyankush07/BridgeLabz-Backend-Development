<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders – QuickBite Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-brand"><a href="/admin/dashboard.html"><i class="fas fa-fire-alt"></i> QuickBite Admin</a>
            </div>
            <nav class="admin-nav">
                <a class="admin-nav-item" href="/admin/dashboard.html"><i class="fas fa-tachometer-alt"></i>
                    Dashboard</a>
                <a class="admin-nav-item active" href="/admin/manage_orders.html"><i class="fas fa-clipboard-list"></i>
                    Manage Orders</a>
                <a class="admin-nav-item" href="/admin/add_food.html"><i class="fas fa-plus-circle"></i> Add Food</a>
                <a class="admin-nav-item" href="/"><i class="fas fa-home"></i> View Site</a>
                <a class="admin-nav-item" href="#" id="adminLogout" style="color:#ff6b6b"><i
                        class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <main class="admin-main">
            <div class="admin-topbar">
                <h2><i class="fas fa-clipboard-list" style="color:var(--primary)"></i> Manage Orders</h2>
            </div>
            <div class="admin-content">
                <div class="admin-table-card">
                    <div id="ordersTableContainer">
                        <div style="text-align:center;padding:40px">
                            <div class="spinner" style="margin:0 auto"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        const statusClasses = { 'Placed': 'badge-pending', 'Preparing': 'badge-preparing', 'Out for Delivery': 'badge-delivery', 'Delivered': 'badge-delivered', 'Cancelled': 'badge-cancelled' };
        const allStatuses = ['Placed', 'Preparing', 'Out for Delivery', 'Delivered', 'Cancelled'];

        async function loadOrders() {
            const meRes = await fetch('/api/me', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const me = await meRes.json();
            if (!me.loggedIn || me.role !== 'admin') { 
                window.location.href = '/admin/admin_login.html'; 
                return; 
            }

            const res = await fetch('/api/admin/orders', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const data = await res.json();
            const container = document.getElementById('ordersTableContainer');
            if (!data.success || !data.orders.length) {
                container.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-muted)">No orders yet.</p>';
                return;
            }

            const rows = data.orders.map(o => {
                const opts = allStatuses.map(s => `<option value="${s}" ${o.orderStatus === s ? 'selected' : ''}>${s}</option>`).join('');
                const custName = o.userId ? o.userId.name : (o.delivery_name || '--');
                const custEmail = o.userId ? o.userId.email : (o.delivery_email || '--');
                const itemCount = o.items ? o.items.length : 0;
                const isDelivered = o.orderStatus === 'Delivered';
                return `
            <tr>
                <td><strong style="color:var(--primary)">#${String(o._id).padStart(6, '0').slice(-6)}</strong></td>
                <td>
                    <div style="font-weight:600">${custName}</div>
                    <div style="font-size:0.78rem;color:var(--text-muted)">${custEmail}</div>
                </td>
                <td>₹${parseFloat(o.totalPrice).toFixed(2)}</td>
                <td>${itemCount} item${itemCount != 1 ? 's' : ''}</td>
                <td>
                    <div style="display:flex; gap: 8px; align-items:center;">
                        <select class="form-control" style="padding:4px 8px;border-radius:6px;font-size:0.8rem;width:auto" 
                                onchange="updateStatus('${o._id}',this)">
                            ${opts}
                        </select>
                        <button class="btn btn-sm btn-outline" style="padding: 4px 8px; font-size: 0.75rem; border-color: var(--success, #28a745); color: var(--success, #28a745); opacity: ${isDelivered ? '0.5' : '1'}; cursor: ${isDelivered ? 'not-allowed' : 'pointer'}" onclick="updateStatus('${o._id}', {value: 'Delivered'})" ${isDelivered ? 'disabled' : ''}>
                            <i class="fas fa-check"></i> Mark Delivered
                        </button>
                    </div>
                </td>
                <td><span class="badge ${statusClasses[o.orderStatus] || 'badge-pending'}">${o.orderStatus}</span></td>
                <td style="font-size:0.8rem;color:var(--text-muted)">${new Date(o.createdAt).toLocaleDateString('en-IN')}</td>
            </tr>`;
            }).join('');

            container.innerHTML = `
        <h3><i class="fas fa-clipboard-list" style="color:var(--primary)"></i> All Orders (${data.orders.length})</h3>
        <div style="overflow-x:auto">
            <table class="admin-table">
                <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Items</th><th>Update Status</th><th>Status</th><th>Date</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
        }

        async function updateStatus(orderId, select) {
            const status = select.value;
            const res = await fetch(`/api/admin/orders/${orderId}/status`, {
                method: 'PUT', 
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ status })
            });
            const data = await res.json();
            if (data.success) {
                showToast(data.message, 'success');
                setTimeout(() => loadOrders(), 500); // refresh list to update buttons and badges correctly
            } else showToast(data.message || 'Update failed', 'error');
        }

        document.getElementById('adminLogout').addEventListener('click', async (e) => {
            e.preventDefault(); 
            localStorage.removeItem('token');
            window.location.href = '/admin/admin_login.html';
        });
        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>

</html>
