<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food List – QuickBite Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-brand"><a href="/admin/dashboard.html"><i class="fas fa-fire-alt"></i> QuickBite Admin</a>
            </div>
            <nav class="admin-nav">
                <a class="admin-nav-item" href="/admin/dashboard.html"><i class="fas fa-tachometer-alt"></i>
                    Dashboard</a>
                <a class="admin-nav-item" href="/admin/manage_orders.html"><i class="fas fa-clipboard-list"></i> Manage
                    Orders</a>
                <a class="admin-nav-item" href="/admin/add_food.html"><i class="fas fa-plus-circle"></i> Add Food</a>
                <a class="admin-nav-item active" href="/admin/food_list.html"><i class="fas fa-list"></i> Food List</a>
                <a class="admin-nav-item" href="/"><i class="fas fa-home"></i> View Site</a>
                <a class="admin-nav-item" href="#" id="adminLogout" style="color:#ff6b6b"><i
                        class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <main class="admin-main">
            <div class="admin-topbar">
                <h2><i class="fas fa-list" style="color:var(--primary)"></i> Food Items</h2>
                <a href="/admin/add_food.html" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Add New</a>
            </div>
            <div class="admin-content">
                <div class="admin-table-card" id="foodListContainer">
                    <div style="text-align:center;padding:40px">
                        <div class="spinner" style="margin:0 auto"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        async function loadFoods() {
            const meRes = await fetch('/api/me', { headers: getAuthHeaders() });
            const me = await meRes.json();
            if (!me.loggedIn || me.role !== 'admin') { window.location.href = '/admin/admin_login.html'; return; }

            const res = await fetch('/api/admin/foods', { headers: getAuthHeaders() });
            const data = await res.json();
            const container = document.getElementById('foodListContainer');
            if (!data.success || !data.foods.length) {
                container.innerHTML = '<p style="text-align:center;padding:40px">No food items yet. <a href="/admin/add_food.html">Add one</a>.</p>';
                return;
            }

            const rows = data.foods.map(f => `
        <tr>
            <td><img src="/images/${f.image}" alt="${f.food_name}" class="food-thumb-admin"
                     onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100&q=75'"></td>
            <td><strong>${f.food_name}</strong></td>
            <td><span class="badge" style="background:rgba(255,107,53,0.1);color:var(--primary)">${f.category}</span></td>
            <td>₹${parseFloat(f.price).toFixed(2)}</td>
            <td>${f.is_featured ? '<span class="badge badge-delivered">Yes</span>' : '<span class="badge" style="background:#eee;color:#999">No</span>'}</td>
            <td>
                <div class="action-btns">
                    <a href="/admin/edit_food.html?id=${f.id}" class="btn btn-outline btn-sm"><i class="fas fa-edit"></i> Edit</a>
                    <button class="btn btn-danger btn-sm" onclick="deleteFood(${f.id}, this)"><i class="fas fa-trash"></i> Delete</button>
                </div>
            </td>
        </tr>`).join('');

            container.innerHTML = `
        <h3><i class="fas fa-utensils" style="color:var(--primary)"></i> All Food Items (${data.foods.length})</h3>
        <div style="overflow-x:auto">
            <table class="admin-table">
                <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Featured</th><th>Actions</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
        }

        async function deleteFood(id, btn) {
            if (!confirm('Delete this food item permanently?')) return;
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            const res = await fetch(`/api/admin/foods/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            const data = await res.json();
            if (data.success) { showToast('Food item deleted.', 'success'); btn.closest('tr').remove(); }
            else { showToast(data.message || 'Delete failed', 'error'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-trash"></i> Delete'; }
        }

        document.getElementById('adminLogout').addEventListener('click', async (e) => {
            e.preventDefault(); await fetch('/api/logout', { method: 'POST' }); window.location.href = '/admin/admin_login.html';
        });
        document.addEventListener('DOMContentLoaded', loadFoods);
    </script>
</body>

</html>
