<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – QuickBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="auth-page" style="background:linear-gradient(135deg,#1a1a2e,#16213e)">
        <div class="auth-card">
            <div class="auth-logo"><i class="fas fa-shield-alt"></i> Admin Panel</div>
            <h2 class="auth-title">Admin Login</h2>
            <p class="auth-subtitle">Restricted access – authorized personnel only</p>
            <div id="alertBox" style="display:none"></div>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="admin@quickbite.in" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Admin password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i> Admin Login
                </button>
            </form>
            <div class="auth-footer" style="margin-top:20px">
                <a href="/login.html" style="color:var(--text-muted);font-size:0.85rem"><i
                        class="fas fa-arrow-left"></i> Back to User Login</a>
            </div>
        </div>
    </div>
    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        if (localStorage.getItem('token')) {
            // Check if it's admin role - the /api/me will verify this with the token
        }

        fetch('/api/me', {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        }).then(r => r.json()).then(d => {
            if (d.loggedIn && d.role === 'admin') window.location.href = '/admin/dashboard.html';
        });

        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in…';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
                });
                const data = await res.json();
                if (data.success && data.user?.role === 'admin') {
                    localStorage.setItem('token', data.token);
                    showToast('Welcome, Admin!', 'success');
                    setTimeout(() => window.location.href = '/admin/dashboard.html', 800);
                } else {
                    const box = document.getElementById('alertBox');
                    box.style.display = 'flex'; box.className = 'alert alert-danger';
                    box.innerHTML = `<i class="fas fa-exclamation-circle"></i><div>${data.message || 'Invalid admin credentials.'}</div>`;
                    btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Admin Login';
                }
            } catch {
                showToast('Network error.', 'error');
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Admin Login';
            }
        });
    </script>
</body>

</html>
