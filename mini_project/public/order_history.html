<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders – QuickBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo"><i class="fas fa-fire-alt"></i> QuickBite</a>
            <div class="nav-links" id="navLinks">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <a href="/menu.html"><i class="fas fa-utensils"></i> Menu</a>
                <a href="/order_history.html" class="active"><i class="fas fa-history"></i> My Orders</a>
            </div>
            <div class="nav-actions">
                <a href="/cart.html" class="cart-btn"><i class="fas fa-shopping-cart"></i><span
                        class="cart-badge hidden" id="cartBadge">0</span></a>
                <div class="user-menu" id="userMenuWrapper" style="display:none">
                    <button class="user-btn" id="userBtn">
                        <i class="fas fa-user-circle"></i>
                        <span id="userNameNav">Account</span>
                        <i class="fas fa-chevron-down" style="font-size:0.7rem"></i>
                    </button>
                    <div class="user-dropdown">
                        <a href="/order_history.html"><i class="fas fa-history"></i> My Orders</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
                <div id="authLinks">
                    <a href="/login.html" class="btn btn-outline btn-sm">Login</a>
                </div>
            </div>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="page-header">
            <h1><i class="fas fa-history"></i> My Orders</h1>
            <p>Track all your past and current orders</p>
            <div class="breadcrumb">
                <a href="/">Home</a><span>›</span><span>My Orders</span>
            </div>
        </div>
        <section class="section">
            <div class="container" id="ordersContent">
                <div style="text-align:center;padding:60px">
                    <div class="spinner" style="margin:0 auto 16px"></div>
                    <p>Loading orders…</p>
                </div>
            </div>
        </section>
    </div>

    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        const statusClasses = {
            'Placed': 'badge-pending', 'Preparing': 'badge-preparing',
            'Out for Delivery': 'badge-delivery', 'Delivered': 'badge-delivered', 'Cancelled': 'badge-cancelled'
        };

        async function loadOrders() {
            const res = await fetch('/api/orders/history', { headers: getAuthHeaders() });
            const data = await res.json();
            const container = document.getElementById('ordersContent');

            if (!data.success || !data.orders.length) {
                container.innerHTML = `
            <div class="empty-cart" style="padding:80px 0">
                <i class="fas fa-receipt" style="font-size:4rem;color:var(--border);margin-bottom:20px;display:block"></i>
                <h3 style="color:var(--text-muted)">No orders yet</h3>
                <p style="color:var(--text-muted);margin-bottom:24px">Place your first order and it will appear here.</p>
                <a href="/menu.html" class="btn btn-primary btn-lg"><i class="fas fa-utensils"></i> Browse Menu</a>
            </div>`;
                return;
            }

            const rows = data.orders.map(o => {
                const padId = String(o._id).padStart(6, '0').slice(-6); // simplified ID display for UI
                const date = new Date(o.createdAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                const cls = statusClasses[o.orderStatus] || 'badge-pending';
                const itemCount = o.items ? o.items.length : 0;
                const itemsList = o.items ? o.items.map(i => i.food_name).join(', ') : '';
                return `
            <tr>
                <td><strong style="color:var(--primary)">#${padId}</strong></td>
                <td>${date}</td>
                <td>
                    <div style="max-width:260px;font-size:0.82rem;color:var(--text-muted)">${itemsList || '—'}</div>
                    <div style="font-size:0.78rem;margin-top:4px">
                        <span class="badge" style="background:rgba(255,107,53,0.1);color:var(--primary)">${itemCount} item${itemCount != 1 ? 's' : ''}</span>
                    </div>
                </td>
                <td><strong>₹${parseFloat(o.totalPrice).toFixed(2)}</strong></td>
                <td>
                    <span class="badge ${cls}">${o.orderStatus}</span><br>
                    ${o.orderStatus === 'Delivered' 
                        ? (o.feedbackId 
                            ? '<span style="color:var(--success); font-weight: 600; font-size: 0.85rem; display: inline-block; margin-top: 8px;">Feedback Given ✅</span>' 
                            : `<button onclick="openFeedbackModal('${o._id}')" class="btn btn-primary" style="padding: 4px 8px; font-size: 0.75rem; margin-top: 8px;">Rate Order</button>`)
                        : '<a href="/tracking.html?order_id=' + o._id + '" class="btn btn-outline" style="padding: 4px 8px; font-size: 0.75rem; margin-top: 8px;">Track Order</a>'
                    }
                    ${o.orderStatus === 'Delivered' 
                        ? `<button onclick="openDriverFeedbackModal('${o._id}')" class="btn btn-outline" style="padding: 4px 8px; font-size: 0.75rem; margin-top: 8px; margin-left: 4px;">Rate Driver</button>` 
                        : ''}
                </td>
            </tr>`;
            }).join('');

            container.innerHTML = `
        <div class="admin-table-card">
            <h3><i class="fas fa-list" style="color:var(--primary)"></i> Order History (${data.orders.length} orders)</h3>
            <table class="orders-table">
                <thead><tr><th>Order ID</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>`;
        }

        async function openFeedbackModal(orderId) {
            const rating = prompt("Rate your experience (1-5 stars):", "5");
            if (!rating || isNaN(rating) || rating < 1 || rating > 5) return;
            const comment = prompt("Any comments?");
            
            try {
                const res = await fetch('/api/feedback/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ orderId, rating: parseInt(rating), comment })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Thank you for your feedback!', 'success');
                    loadOrders();
                } else {
                    showToast(data.message || 'Error submitting feedback', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            }
        }

        async function openDriverFeedbackModal(orderId) {
            const rating = prompt("Rate your delivery driver (1-5 stars):", "5");
            if (!rating || isNaN(rating) || rating < 1 || rating > 5) return;
            
            try {
                const res = await fetch(`/api/orders/${orderId}/rate-delivery`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
                    body: JSON.stringify({ rating: parseInt(rating) })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Driver rated successfully!', 'success');
                } else {
                    showToast(data.message || 'Error submitting driver rating', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>

</html>
