<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart – QuickBite</title>
    <meta name="description" content="Review your cart items before proceeding to checkout.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo"><i class="fas fa-fire-alt"></i> QuickBite</a>
            <div class="nav-links" id="navLinks">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <a href="/menu.html"><i class="fas fa-utensils"></i> Menu</a>
                <a href="/order_history.html" id="navOrderHistory" style="display:none"><i class="fas fa-history"></i>
                    My Orders</a>
            </div>
            <div class="nav-actions">
                <a href="/cart.html" class="cart-btn" title="My Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge hidden" id="cartBadge">0</span>
                </a>
                <div class="user-menu" id="userMenuWrapper" style="display:none">
                    <button class="user-btn" id="userBtn">
                        <i class="fas fa-user-circle"></i>
                        <span id="userNameNav">Account</span>
                        <i class="fas fa-chevron-down" style="font-size:0.7rem"></i>
                    </button>
                    <div class="user-dropdown">
                        <a href="/order_history.html"><i class="fas fa-history"></i> My Orders</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
                <div id="authLinks">
                    <a href="/login.html" class="btn btn-outline btn-sm">Login</a>
                    <a href="/signup.html" class="btn btn-primary btn-sm">Sign Up</a>
                </div>
            </div>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="page-header">
            <h1><i class="fas fa-shopping-cart"></i> My Cart</h1>
            <p>Review your items before checkout</p>
            <div class="breadcrumb">
                <a href="/">Home</a><span>›</span><a href="/menu.html">Menu</a><span>›</span><span>Cart</span>
            </div>
        </div>

        <div class="cart-section" id="cartContent">
            <div style="text-align:center;padding:60px">
                <div class="spinner" style="margin:0 auto 16px"></div>
                <p>Loading cart…</p>
            </div>
        </div>
    </div>

    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        async function loadCart() {
            const meRes = await fetch('/api/me', {
                headers: getAuthHeaders()
            });
            const me = await meRes.json();
            if (!me.loggedIn) {
                window.location.href = '/login.html';
                return;
            }

            const res = await fetch('/api/cart', {
                headers: getAuthHeaders()
            });
            const data = await res.json();
            const section = document.getElementById('cartContent');

            if (!data.success || !data.items || data.items.length === 0) {
                section.innerHTML = `
            <div class="empty-cart">
                <i class="fas fa-shopping-cart"></i>
                <h3>Your cart is empty</h3>
                <p style="color:var(--text-muted);margin-bottom:24px">Looks like you haven't added anything yet.</p>
                <a href="/menu.html" class="btn btn-primary btn-lg"><i class="fas fa-utensils"></i> Browse Menu</a>
            </div>`;
                return;
            }

            const { items, count, total } = data;
            const delivery = 30;
            const grandTotal = total + delivery;

            const rows = items.map(item => `
        <tr id="cart-row-${item.cart_id}">
            <td>
                <div class="cart-item-info">
                    <img src="${item.image}" alt="${item.food_name}" class="cart-item-img"
                         onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100&q=75'">
                    <div>
                        <div class="cart-item-name">${item.food_name}</div>
                        <div class="cart-item-category">${item.category}</div>
                    </div>
                </div>
            </td>
            <td>₹${parseFloat(item.price).toFixed(2)}</td>
            <td>
                <div class="qty-control">
                    <button class="qty-btn" onclick="updateQuantity('${item.cart_id}',-1)">−</button>
                    <span class="qty-display" id="qty-${item.cart_id}">${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQuantity('${item.cart_id}',1)">+</button>
                </div>
            </td>
            <td id="subtotal-${item.cart_id}">₹${(item.price * item.quantity).toFixed(2)}</td>
            <td>
                <button class="remove-btn" onclick="removeFromCart('${item.cart_id}')" title="Remove">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </td>
        </tr>`).join('');

            section.innerHTML = `
        <div class="cart-layout">
            <div>
                <div style="background:#fff;border-radius:16px;padding:24px;box-shadow:var(--shadow);overflow-x:auto">
                    <table class="cart-table">
                        <thead><tr><th>Item</th><th>Price</th><th>Quantity</th><th>Subtotal</th><th></th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
                <div style="margin-top:16px">
                    <a href="/menu.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
                </div>
            </div>
            <div class="cart-summary-card">
                <h3><i class="fas fa-receipt" style="color:var(--primary)"></i> Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal <small style="color:var(--text-muted)">(${items.length} items)</small></span>
                    <span id="cartTotal">₹${total.toFixed(2)}</span>
                </div>
                <div class="summary-row"><span>Delivery Charge</span><span>₹${delivery.toFixed(2)}</span></div>
                <div class="summary-row"><span>Discount</span><span style="color:var(--success)">– ₹0.00</span></div>
                <div class="summary-row total">
                    <span>Grand Total</span>
                    <span id="cartGrandTotal">₹${grandTotal.toFixed(2)}</span>
                </div>
                <a href="/checkout.html" class="btn btn-primary btn-block btn-lg" style="margin-top:20px">
                    <i class="fas fa-lock"></i> Proceed to Checkout
                </a>
                <p style="font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:12px">
                    <i class="fas fa-shield-alt"></i> Secure & safe checkout
                </p>
            </div>
        </div>`;
        }

        document.addEventListener('DOMContentLoaded', loadCart);
    </script>
</body>

</html>
