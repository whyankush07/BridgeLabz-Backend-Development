<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – QuickBite</title>
    <meta name="description" content="Sign in to your QuickBite account to order delicious food.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo"><i class="fas fa-fire-alt"></i> QuickBite</a>
            <div class="nav-links" id="navLinks">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <a href="/menu.html"><i class="fas fa-utensils"></i> Menu</a>
            </div>
            <div class="nav-actions">
                <a href="/cart.html" class="cart-btn" title="My Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge hidden" id="cartBadge">0</span>
                </a>
            </div>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="auth-page" style="padding-top:90px">
        <div class="auth-card">
            <div class="auth-logo"><i class="fas fa-fire-alt"></i> QuickBite</div>
            <h2 class="auth-title">Welcome Back!</h2>
            <p class="auth-subtitle">Sign in to your account to continue</p>

            <div id="alertBox" style="display:none"></div>

            <form id="loginForm" data-validate>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com"
                            required>
                    </div>
                    <div class="invalid-feedback"><i class="fas fa-exclamation-circle"></i><span>Please enter your
                            email</span></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Enter your password" required>
                    </div>
                    <div class="invalid-feedback"><i class="fas fa-exclamation-circle"></i><span>Please enter your
                            password</span></div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="auth-divider">or</div>
            <div class="auth-footer">
                Don't have an account? <a href="/signup.html">Create one for free</a>
            </div>
            <div class="auth-footer" style="margin-top:10px">
                <a href="/admin/admin_login.html" style="color:var(--text-muted);font-size:0.8rem">
                    <i class="fas fa-shield-alt"></i> Admin Login
                </a>
            </div>
        </div>
    </div>

    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        // Redirect if already logged in
        fetch('/api/me').then(r => r.json()).then(d => {
            if (d.loggedIn) window.location.href = '/menu.html';
        });

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Login successful! Redirecting…', 'success');
                    setTimeout(() => window.location.href = data.redirect || '/menu.html', 800);
                } else {
                    const box = document.getElementById('alertBox');
                    box.style.display = 'flex';
                    box.className = 'alert alert-danger';
                    box.innerHTML = `<i class="fas fa-exclamation-circle"></i><div>${data.message || 'Login failed.'}</div>`;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch {
                showToast('Network error. Is the server running?', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
    </script>
</body>

</html>
