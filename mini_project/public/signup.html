<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – QuickBite</title>
    <meta name="description" content="Create your QuickBite account and start ordering delicious food.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo"><i class="fas fa-fire-alt"></i> QuickBite</a>
            <div class="nav-links" id="navLinks">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <a href="/menu.html"><i class="fas fa-utensils"></i> Menu</a>
            </div>
            <div class="nav-actions">
                <a href="/cart.html" class="cart-btn" title="My Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge hidden" id="cartBadge">0</span>
                </a>
            </div>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="auth-page" style="padding-top:90px">
        <div class="auth-card">
            <div class="auth-logo"><i class="fas fa-fire-alt"></i> QuickBite</div>
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join thousands of happy customers today</p>

            <div id="alertBox" style="display:none"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" class="form-control" placeholder="Your full name" required>
                    </div>
                    <div class="invalid-feedback" id="nameErr" style="display:none"><i
                            class="fas fa-exclamation-circle"></i><span></span></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                    <div class="invalid-feedback" id="emailErr" style="display:none"><i
                            class="fas fa-exclamation-circle"></i><span></span></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters"
                            required>
                    </div>
                    <div class="invalid-feedback" id="passwordErr" style="display:none"><i
                            class="fas fa-exclamation-circle"></i><span></span></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirm_password" class="form-control"
                            placeholder="Re-enter your password" required>
                    </div>
                    <div class="invalid-feedback" id="confirmErr" style="display:none"><i
                            class="fas fa-exclamation-circle"></i><span></span></div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px" id="submitBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-divider">or</div>
            <div class="auth-footer">Already have an account? <a href="/login.html">Sign in here</a></div>
        </div>
    </div>

    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        fetch('/api/me').then(r => r.json()).then(d => {
            if (d.loggedIn) window.location.href = '/menu.html';
        });

        function showFieldError(id, msg) {
            const el = document.getElementById(id);
            el.style.display = 'flex';
            el.querySelector('span').textContent = msg;
        }
        function clearErrors() {
            ['nameErr', 'emailErr', 'passwordErr', 'confirmErr'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
            document.querySelectorAll('.form-control').forEach(f => f.classList.remove('is-invalid'));
        }

        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            clearErrors();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account…';

            const body = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                confirm_password: document.getElementById('confirm_password').value
            };

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Account created! Redirecting…', 'success');
                    setTimeout(() => window.location.href = data.redirect || '/menu.html', 800);
                } else if (data.errors) {
                    const map = { name: 'nameErr', email: 'emailErr', password: 'passwordErr', confirm: 'confirmErr' };
                    Object.entries(data.errors).forEach(([k, v]) => {
                        if (map[k]) { showFieldError(map[k], v); document.getElementById(k === 'confirm' ? 'confirm_password' : k)?.classList.add('is-invalid'); }
                    });
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                } else {
                    showToast(data.message || 'Signup failed.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                }
            } catch {
                showToast('Network error. Is the server running?', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });
    </script>
</body>

</html>
