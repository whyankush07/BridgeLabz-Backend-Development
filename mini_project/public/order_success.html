<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed! – QuickBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo"><i class="fas fa-fire-alt"></i> QuickBite</a>
            <div class="nav-links" id="navLinks">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <a href="/menu.html"><i class="fas fa-utensils"></i> Menu</a>
            </div>
            <div class="nav-actions">
                <a href="/cart.html" class="cart-btn"><i class="fas fa-shopping-cart"></i><span
                        class="cart-badge hidden" id="cartBadge">0</span></a>
            </div>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="page-wrapper"
        style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px">
        <div id="successContent" style="text-align:center">
            <div class="spinner" style="margin:0 auto"></div>
        </div>
    </div>

    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>
    <script src="/js/script.js"></script>
    <script>
        async function loadSuccess() {
            const meRes = await fetch('/api/me', { headers: getAuthHeaders() });
            const me = await meRes.json();
            if (!me.loggedIn) { window.location.href = '/login.html'; return; }

            const orderId = new URLSearchParams(window.location.search).get('order_id');
            if (!orderId) { window.location.href = '/'; return; }

            const res = await fetch(`/api/orders/${orderId}`, { headers: getAuthHeaders() });
            const data = await res.json();
            if (!data.success) { window.location.href = '/'; return; }

            const order = data.order;
            const verificationCode = data.order.verificationCode;
            const padId = String(order.order_id || orderId).padStart(6, '0');

            document.getElementById('successContent').innerHTML = `
        <div class="success-page">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2>Order Placed!</h2>
            <p>Thank you, <strong>${me.user_name}</strong>! Your order has been received and is being prepared.</p>
            <div class="order-id-card">
                <div class="label">Order ID</div>
                <div class="value">#${padId}</div>
            </div>
            <div class="order-id-card" style="margin-top: -15px; background: #e0f2fe; border-color: #7dd3fc;">
                <div class="label" style="color: #0369a1;">Verification Code</div>
                <div class="value" style="color: #0369a1; letter-spacing: 4px;">${verificationCode}</div>
            </div>
            <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 25px;">Please share this 4-digit code with the rider when they arrive to confirm your delivery.</p>
            <div style="background:#f8f4f0;border-radius:12px;padding:20px;margin-bottom:28px;text-align:left">
                <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.875rem">
                    <span style="color:var(--text-muted)">Total Amount</span>
                    <strong>₹${parseFloat(order.totalPrice).toFixed(2)}</strong>
                </div>
                <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.875rem">
                    <span style="color:var(--text-muted)">Delivery To</span>
                    <span style="max-width:200px;text-align:right">${order.delivery_address}</span>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:0.875rem">
                    <span style="color:var(--text-muted)">Status</span>
                    <span class="badge badge-pending"><i class="fas fa-clock"></i> ${order.orderStatus}</span>
                </div>
            </div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
                <a href="/order_history.html" class="btn btn-primary btn-lg"><i class="fas fa-list"></i> Track My Orders</a>
                <a href="/menu.html" class="btn btn-outline btn-lg"><i class="fas fa-utensils"></i> Order More</a>
            </div>
            <p style="font-size:0.8rem;color:var(--text-muted);margin-top:28px">
                <i class="fas fa-motorcycle" style="color:var(--primary)"></i>
                Estimated delivery: <strong>30–45 minutes</strong>
            </p>
        </div>`;

            // Confetti
            const colors = ['#ff6b35', '#ff8c5a', '#28a745', '#ffc107', '#17a2b8'];
            for (let i = 0; i < 80; i++) {
                const conf = document.createElement('div');
                conf.style.cssText = `position:fixed;top:-10px;left:${Math.random() * 100}%;width:${6 + Math.random() * 6}px;height:${6 + Math.random() * 6}px;background:${colors[Math.floor(Math.random() * colors.length)]};border-radius:${Math.random() > 0.5 ? '50%' : '2px'};animation:confettiFall ${2 + Math.random() * 3}s linear ${Math.random() * 1.5}s forwards;z-index:9999;pointer-events:none;opacity:0.9;`;
                document.body.appendChild(conf);
            }
            const s = document.createElement('style');
            s.textContent = '@keyframes confettiFall{to{top:110vh;transform:rotate(720deg);opacity:0}}';
            document.head.appendChild(s);
        }

        document.addEventListener('DOMContentLoaded', loadSuccess);
    </script>
</body>

</html>
