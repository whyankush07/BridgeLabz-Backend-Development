<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Signup - QuickBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8f9fa; padding: 40px 20px; }
        .login-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h2 { color: var(--primary); font-size: 1.8rem; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-dark); }
        .form-control { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; transition: all 0.3s ease; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .btn-block { display: block; width: 100%; }
        .msg-box { font-size: 0.85rem; margin-top: 15px; display: none; text-align: center; padding: 10px; border-radius: 6px; }
        .msg-error { background: #f8d7da; color: #842029; }
        .msg-success { background: #d1e7dd; color: #0f5132; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h2><i class="fas fa-store"></i> QuickBite</h2>
                <p>Register a New Restaurant Branch</p>
            </div>
            <form id="restaurantSignupForm">
                <div class="form-group">
                    <label>Restaurant Name</label>
                    <input type="text" id="restaurantName" class="form-control" required placeholder="e.g. QuickBite">
                </div>
                <div class="form-group">
                    <label>Branch Name / Location</label>
                    <input type="text" id="branchName" class="form-control" required placeholder="e.g. Downtown">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Create a password">
                </div>
                <div class="msg-box" id="msgBox"></div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top:20px;">
                    Register Branch
                </button>
            </form>
            <div style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                <p style="margin-bottom:10px;color:var(--text-muted)">Already registered? <a href="/restaurant/login.html" style="color:var(--primary);font-weight:600;">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('restaurantToken')) {
            window.location.href = '/restaurant/dashboard.html';
        }

        document.getElementById('restaurantSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const restaurantName = document.getElementById('restaurantName').value;
            const branchName = document.getElementById('branchName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msgBox');
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/restaurant/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ restaurantName, branchName, email, password })
                });
                const data = await res.json();
                
                msgBox.style.display = 'block';
                if (data.success) {
                    localStorage.setItem('restaurantToken', data.token);
                    msgBox.className = 'msg-box msg-success';
                    msgBox.textContent = data.message;
                    setTimeout(() => {
                        window.location.href = '/restaurant/dashboard.html';
                    }, 1500);
                } else {
                    msgBox.className = 'msg-box msg-error';
                    msgBox.textContent = data.message || 'Registration failed';
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                msgBox.style.display = 'block';
                msgBox.className = 'msg-box msg-error';
                msgBox.textContent = 'Server error. Try again.';
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
