<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Login - QuickBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8f9fa; }
        .login-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h2 { color: var(--primary); font-size: 1.8rem; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-dark); }
        .form-control { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; transition: all 0.3s ease; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .btn-block { display: block; width: 100%; }
        .error-msg { color: #dc3545; font-size: 0.85rem; margin-top: 10px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h2><i class="fas fa-store"></i> QuickBite</h2>
                <p>Restaurant Portal Login</p>
            </div>
            <form id="restaurantLoginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter restaurant email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter password">
                </div>
                <div class="error-msg" id="errorMsg"></div>
                <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top:20px;">
                    Login to Dashboard
                </button>
            </form>
            <div style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                <p style="margin-bottom:10px;color:var(--text-muted)">New branch? <a href="/restaurant/signup.html" style="color:var(--primary);font-weight:600;">Sign up here</a></p>
                <a href="/" style="color: var(--text-muted); text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Main Site</a>
            </div>
        </div>
    </div>

    <script>
        // Remove blind redirection based only on token presence
        // checkAuth on the dashboard will handle invalid tokens by clearing them

        document.getElementById('restaurantLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/restaurant/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('restaurantToken', data.token);
                    window.location.href = '/restaurant/dashboard.html';
                } else {
                    errorMsg.textContent = data.message || 'Invalid credentials';
                    errorMsg.style.display = 'block';
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Try again.';
                errorMsg.style.display = 'block';
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
